name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --silent

      - name: Lint
        shell: bash
        run: |
          set +e
          npm run lint > /tmp/lint.log 2>&1
          status=$?
          tail -n 100 /tmp/lint.log
          exit $status

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: D1 migration dry run
        run: npm run db:migrate:local

      - name: Production build
        run: npm run build
