name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --silent

      - name: Prepare diagnostics
        run: mkdir -p diagnostics

      - name: Lint
        id: lint
        shell: bash
        run: |
          set +e
          npm run lint > diagnostics/lint.log 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > diagnostics/typecheck.log 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Unit tests
        id: tests
        shell: bash
        run: |
          set +e
          npm run test > diagnostics/tests.log 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: D1 migration dry run
        id: migration
        shell: bash
        run: |
          set +e
          npm run db:migrate:local > diagnostics/migration.log 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Production build
        id: build
        shell: bash
        run: |
          set +e
          npm run build > diagnostics/build.log 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-diagnostics
          path: diagnostics

      - name: Enforce validation results
        shell: bash
        run: |
          if [ "${{ steps.lint.outputs.status }}" != "0" ] || \
             [ "${{ steps.typecheck.outputs.status }}" != "0" ] || \
             [ "${{ steps.tests.outputs.status }}" != "0" ] || \
             [ "${{ steps.migration.outputs.status }}" != "0" ] || \
             [ "${{ steps.build.outputs.status }}" != "0" ]; then
            exit 1
          fi
