name: Bootstrap MVP source

on:
  push:
    branches:
      - feat/mvp-implementation
    paths:
      - "tools/bootstrap/**"
      - ".github/workflows/bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/mvp-implementation

      - name: Restore project files
        run: python tools/bootstrap/unpack.py

      - name: Commit restored source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement Name100Women MVP"
          git push origin HEAD:feat/mvp-implementation
